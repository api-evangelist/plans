meta:
  name: Plans
  description: An index and topic collection covering machine-readable API and SaaS
    plan definitions. Plans capture the structured representation of pricing tiers,
    included entitlements, metered entries, add-ons, and rate plans that a provider
    exposes — whether as API Commons Plans YAML, OpenAPI `x-plans` extensions, in-band
    catalog APIs (Stripe Products/Prices, Lago Plans, OpenMeter Plans, Chargebee Plans,
    Recurly Plans, Metronome Plans, Orb Plans, Apigee Rate Plans, Zuplo Plans), or
    scraped pricing-page artifacts. This collection focuses on providers whose `/plans/`
    directory is generated by the API Evangelist pipeline, treating the plan itself
    as a first-class machine-readable artifact distinct from the broader monetization
    or rate-limiting surface.
  tags:
  - Pricing Plans
  - API Commons Plans
  - Subscription Tiers
  - Pricing Page
  - Plan Catalog
  - Rate Plans
  - Plan Entitlements
  portal: https://apievangelist.com
  github: https://github.com/api-evangelist
  repo: plans
