features:
- name: Machine-Readable Pricing Tiers
  description: Plans expose subscription tiers (Free, Pro, Enterprise, Custom) as
    structured artifacts that downstream tooling can parse, compare, and reconcile
    against billing records.
- name: API Commons Plans Specification
  description: Providers can publish a normalized API Commons Plans YAML file describing
    plan IDs, entries, metrics, limits, time frames, and prices — the canonical machine-readable
    representation used across this network.
- name: In-Band Plan Catalog APIs
  description: Billing platforms such as Stripe, Chargebee, Recurly, Lago, Metronome,
    Orb, and Apigee expose plan and price catalogs through their own APIs, enabling
    programmatic synchronization of pricing into product, billing, and entitlement
    systems.
- name: Pricing-Page Scrapers and Reconciliation
  description: When providers do not publish in-band plan catalogs, scaffolded pricing-page
    scrapers extract tier and entry data from public pricing pages, then reconcile
    them against provider documentation to produce a verifiable plans artifact.
- name: Plan Entitlements and Feature Flags
  description: Plans declare entitlements — included features, request quotas, seat
    caps, retention windows, support SLAs — that platforms like Schematic and Stigg
    consume to drive in-product gating, packaging experiments, and trial flows.
- name: Rate Plans and Metered Entries
  description: Plans capture metered usage entries (transactions, requests, events,
    GB-ingested, seats) with per-unit pricing, tier breaks, and overage rules — the
    underlying contract for usage-based billing engines.
use_cases:
- name: Pricing Page to Catalog Sync
  description: Marketing-published pricing pages are scraped into API Commons Plans
    YAML, validated against the provider's catalog API, and used to keep public pricing
    and billed prices in lockstep.
- name: Plan Comparison and Procurement
  description: Procurement platforms like Vendr and cost tools like Infracost ingest
    normalized plan artifacts across vendors to compare tiers, identify overpayment,
    and surface negotiable line items.
- name: Entitlement Enforcement in Product
  description: Product teams use entitlement platforms like Schematic and Stigg to
    read plan definitions and gate features, meter usage, and present in-product upgrade
    prompts driven by the same artifact billing uses.
- name: Usage-Based Billing Configuration
  description: Engineering teams seed billing platforms (Lago, Metronome, Orb, Amberflo,
    Togai, M3ter) with plan artifacts that declare metrics, tier breaks, and commitments
    — replacing per-tenant pricing spreadsheets with a versioned source of truth.
- name: API Marketplace Plan Tagging
  description: API hubs and gateways (Postman, Apigee, Zuplo) tag listed APIs with
    the plan tiers under which they are accessible, letting consumers filter discovery
    by subscription level and authentication scope.
- name: Pricing Governance and Audit
  description: Finance and revenue operations use machine-readable plan artifacts
    to audit historical pricing changes, detect drift between the website and the
    billing system, and produce SOC-2-friendly pricing change logs.
integrations:
- name: Stripe
  description: Products and Prices APIs expose subscription plans, tiered pricing,
    and metered components — the most widely integrated plan catalog in the SaaS billing
    ecosystem.
- name: Lago
  description: Open-source usage-based billing platform whose Plans API is a first-class
    resource for declaring subscription tiers, charges, and minimum commitments.
- name: Metronome
  description: Usage-based billing platform exposing customer plans, rate cards, and
    commit balances designed for high-throughput consumption pricing.
- name: Orb
  description: Billing platform whose Plans and Prices APIs model tiered, volume,
    package, and matrix pricing alongside metered events.
- name: Schematic
  description: Entitlements and packaging platform that consumes plan artifacts to
    drive in-product feature gating, paywall experiments, and pricing-page rendering.
- name: Stigg
  description: Pricing and packaging platform exposing plans, features, and entitlements
    as a managed catalog consumed by application code and billing systems.
- name: Google Apigee
  description: API management platform whose Rate Plans (Apigee Monetization) model
    entitled API products, included quotas, overage rates, and revenue share.
- name: Postman
  description: API hub that tags published APIs with subscription tiers and plan metadata
    for marketplace discovery and access control.
