title: Plans
description: An index and topic collection covering machine-readable API and SaaS
  plan definitions. Plans capture the structured representation of pricing tiers,
  included entitlements, metered entries, add-ons, and rate plans that a provider
  exposes — whether as API Commons Plans YAML, OpenAPI `x-plans` extensions, in-band
  catalog APIs (Stripe Products/Prices, Lago Plans, OpenMeter Plans, Chargebee Plans,
  Recurly Plans, Metronome Plans, Orb Plans, Apigee Rate Plans, Zuplo Plans), or scraped
  pricing-page artifacts. This collection focuses on providers whose `/plans/` directory
  is generated by the API Evangelist pipeline, treating the plan itself as a first-class
  machine-readable artifact distinct from the broader monetization or rate-limiting
  surface.
url: https://plans.apievangelist.com
collections:
  api_stories:
    output: false
exclude:
- README.md
- Gemfile
- Gemfile.lock
- Dockerfile
- examples
- json-ld
- json-schema
- json-structure
- vocabulary
